server {
    listen 80;
    listen [::]:80;
    server_name cartoshka.site www.cartoshka.site;

    # Максимальный размер загрузки файла
    client_max_body_size 50M;

    # Логи
    access_log /var/log/nginx/cartoshka.site_access.log;
    error_log /var/log/nginx/cartoshka.site_error.log;

    # Загруженные файлы (uploads) - ПРИОРИТЕТ МАКСИМАЛЬНЫЙ!
    location ^~ /uploads/ {
        alias /root/cartoshka/Anechka_solnce/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API запросы к backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_max_temp_file_size 0;
    }

    # Статические файлы frontend
    location / {
        root /root/cartoshka/Anechka_solnce/dist;
        index index.html;
        
        # SPA routing - все несуществующие пути идут на index.html
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.html break;
        }
    }

    # Кэширование статических ресурсов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /root/cartoshka/Anechka_solnce/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Запрет на прямой доступ к файлам
    location ~ /\. {
        deny all;
    }
}
